<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO -->
  <title>Daily Typing Speed Test — LogicVault</title>
  <meta name="description" content="Take today's free typing speed test. Measure your WPM and accuracy with a new quote every day. Track your progress and build your streak.">
  
  <!-- Open Graph -->
  <meta property="og:title" content="Daily Typing Speed Test — LogicVault">
  <meta property="og:description" content="Test your typing speed with today's quote.">
  <meta property="og:image" content="assets/og-image.png">
  <meta property="og:type" content="website">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body>
  <!-- Navigation -->
  <nav class="nav">
    <div class="container nav__inner">
      <a href="index.html" class="nav__logo">
        <span>Logic</span><span style="font-weight: 700;">⚡Vault</span>
      </a>
      <div class="nav__links">
        <a href="index.html">← Back</a>
        <a href="stats.html">📊 Stats</a>
        <div id="nav-streak"></div>
      </div>
    </div>
  </nav>

  <!-- Typing Container -->
  <div class="typing-container">
    <!-- Header -->
    <div class="typing-header">
      <h1>⌨️ Typing Challenge</h1>
      <div class="flex gap-2 items-center">
        <span id="today-date" class="text-muted"></span>
        <span id="difficulty-badge" class="badge badge--typing"></span>
        <span id="best-wpm-badge" class="badge badge--xp">Best: — WPM</span>
      </div>
    </div>

    <!-- Quote Box -->
    <div class="quote-box" id="quote-box">
      <!-- Populated by JS -->
    </div>

    <!-- Hidden Input -->
    <input type="text" class="typing-input" id="typing-input" autocomplete="off" autocapitalize="off" spellcheck="false">

    <!-- Live Stats -->
    <div class="live-stats" id="live-stats">
      <div class="live-stat">
        <div class="live-stat__value">0</div>
        <div class="live-stat__label">WPM</div>
      </div>
      <div class="live-stat">
        <div class="live-stat__value">100%</div>
        <div class="live-stat__label">Accuracy</div>
      </div>
      <div class="live-stat">
        <div class="live-stat__value">0s</div>
        <div class="live-stat__label">Time</div>
      </div>
      <div class="live-stat">
        <div class="progress-ring">
          <div class="progress-ring__fill" style="width: 0%"></div>
        </div>
        <div class="live-stat__label">Progress</div>
      </div>
    </div>

    <!-- Completion Modal -->
    <div class="completion-modal hidden" id="completion-modal">
      <!-- Populated on completion -->
    </div>

    <!-- Keyboard Heatmap (shown after completion) -->
    <div id="keyboard-heatmap" class="hidden"></div>

    <!-- Ad Slot -->
    <div id="ad-slot"></div>

    <!-- Past Scores -->
    <div class="mt-4">
      <h3 class="text-center mb-2">Your Last 7 Typing Sessions</h3>
      <div class="bar-chart" id="past-scores-chart">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container text-center">
      <p class="text-muted" style="font-size: 0.85rem;">
        Built by voidbuilds · logicvault.tech
      </p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/typing.js"></script>
  
  <script>
    let typingGame = null;
    
    document.addEventListener('DOMContentLoaded', () => {
      // Check and update streaks
      checkAndUpdateStreaks();
      
      const stats = getStats();
      
      // Update nav streak
      if (stats.typing.currentStreak > 0) {
        document.getElementById('nav-streak').innerHTML = renderStreakBadge(stats.typing.currentStreak);
      }
      
      // Get quote from URL param or use today's
      const urlParams = new URLSearchParams(window.location.search);
      const quoteId = urlParams.get('quote');
      const quote = quoteId ? getQuoteById(quoteId) : getTodayQuote();
      
      // If quote not found, use today's
      if (!quote) {
        window.location.href = 'typing.html';
        return;
      }
      
      // Update header
      document.getElementById('today-date').textContent = getTodayDate();
      document.getElementById('difficulty-badge').textContent = quote.difficulty.toUpperCase();
      document.getElementById('difficulty-badge').className = `badge badge--typing difficulty--${quote.difficulty}`;
      document.getElementById('best-wpm-badge').textContent = `Best: ${stats.typing.bestWPM || '—'} WPM`;
      
      // Initialize game
      typingGame = new TypingGame();
      typingGame.init(quote);
      
      // Render ad slot
      const adContainer = document.getElementById('ad-slot');
      if (adContainer) {
        adContainer.appendChild(renderAdSlot('banner'));
      }
      
      // Render past scores chart
      renderPastScoresChart(stats.typing.history.slice(0, 7));
    });
    
    /**
     * Render past scores bar chart
     */
    function renderPastScoresChart(history) {
      const container = document.getElementById('past-scores-chart');
      if (!container || history.length === 0) {
        container.innerHTML = '<p class="text-muted text-center">No games played yet. Start typing!</p>';
        return;
      }
      
      const maxWpm = Math.max(...history.map(h => h.wpm), 1);
      
      const bars = history.map(entry => {
        const height = (entry.wpm / maxWpm) * 100;
        let color = 'var(--wrong)';
        if (entry.wpm >= 70) color = 'var(--typing)';
        else if (entry.wpm >= 40) color = 'var(--warning)';
        
        return `
          <div class="bar-chart__bar" style="height: ${height}%; background: ${color}" title="${entry.wpm} WPM">
          </div>
        `;
      }).reverse().join('');
      
      container.innerHTML = bars;
    }
  </script>
</body>
</html>
