<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO -->
  <title>Page Not Found — LogicVault</title>
  <meta name="description" content="This page is the real puzzle. Find your way back to LogicVault.">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body>
  <div class="error-page">
    <div class="container">
      <div class="error-page__code">404</div>
      <h1 class="error-page__title">🧩 This page is the real puzzle.</h1>
      <p class="error-page__desc">
        Looks like you've wandered into uncharted territory. 
        But don't worry—here's a quick riddle while you find your way back:
      </p>
      
      <div class="card mb-4" style="max-width: 500px; margin: 0 auto 32px;">
        <p id="riddle-question" style="font-size: 1.125rem; margin-bottom: 16px;"></p>
        <button class="btn btn--ghost btn--sm" onclick="showRiddleAnswer()">
          💡 Show Answer
        </button>
        <p id="riddle-answer" class="hidden mt-2 text-correct" style="font-weight: 600;"></p>
      </div>
      
      <div class="flex justify-center gap-3 flex-wrap">
        <a href="index.html" class="btn btn--primary">🏠 Go Home</a>
        <a href="typing.html" class="btn btn--secondary">⌨️ Typing Challenge</a>
        <a href="logic.html" class="btn btn--secondary">🧩 Logic Puzzle</a>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script>
    // Show a random easy riddle
    const riddles = [
      { q: "What has keys but can't open locks?", a: "A piano" },
      { q: "What gets wetter the more it dries?", a: "A towel" },
      { q: "What has a head and a tail but no body?", a: "A coin" },
      { q: "What can you catch but never throw?", a: "A cold" },
      { q: "What goes up but never comes down?", a: "Your age" }
    ];
    
    const riddle = riddles[Math.floor(Math.random() * riddles.length)];
    document.getElementById('riddle-question').textContent = riddle.q;
    document.getElementById('riddle-answer').textContent = 'Answer: ' + riddle.a;
    
    function showRiddleAnswer() {
      document.getElementById('riddle-answer').classList.remove('hidden');
    }
  </script>
</body>
</html>
